# nginx reverse proxy for Isidore Cloud Dashboard
# Include in your server block: include /path/to/nginx-dashboard.conf;
#
# SSE-aware: disables proxy buffering so Server-Sent Events stream correctly.
# Requires DASHBOARD_TOKEN to be set in bridge.env when exposed externally.

location /dashboard/ {
    proxy_pass http://127.0.0.1:3456/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE support: disable buffering so events stream immediately
    proxy_buffering off;
    proxy_cache off;

    # Keep SSE connections alive
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# SSE-specific location for explicit no-buffer guarantee
location /dashboard/events {
    proxy_pass http://127.0.0.1:3456/events;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_read_timeout 86400s;
}
